<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mis Reservas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-5">
    <h2>Mis Reservas</h2>

    <div th:if="${param.exito}" class="alert alert-success">
        Reserva creada correctamente.
    </div>

    <table class="table table-bordered">
        <thead>
        <tr>
            <th>Fecha</th>
            <th>Servicio</th>
            <th>Estado</th>
            <th>Acción</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="reserva : ${reservas}">
            <td th:text="${reserva.fechaHora}"></td>
            <td th:text="${reserva.servicio.nombre}"></td>
            <td th:text="${reserva.estado}"></td>
            <td>
                <form th:if="${reserva.estado != 'CANCELADA'}"
                    th:action="@{/reservas/cancelar/{id}(id=${reserva.id})}"
                    method="post">
                    <button class="btn btn-danger btn-sm">Cancelar</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <a href="/reservas/nueva" class="btn btn-warning">Nueva reserva</a>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mis Reservas - BarberTime</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Mis reservas</h2>

        <a
            th:href="@{/reservas/nueva}"
            class="btn btn-warning">
            Nueva reserva
        </a>
    </div>

    <div th:if="${param.exito}" class="alert alert-success">
        Reserva creada correctamente.
    </div>

    <div
        th:if="${mensaje}"
        class="alert alert-success"
        th:text="${mensaje}">
    </div>

    <div
        th:if="${error}"
        class="alert alert-danger"
        th:text="${error}">
    </div>

    <div
        th:if="${reservas.isEmpty()}"
        class="alert alert-info">

        Todavía no tienes reservas registradas.
    </div>

    <div class="table-responsive" th:unless="${reservas.isEmpty()}">

        <table class="table table-bordered table-hover align-middle">

            <thead class="table-dark">
            <tr>
                <th>Fecha</th>
                <th>Servicio</th>
                <th>Barbero</th>
                <th>Estado</th>
                <th>Acción</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="reserva : ${reservas}">

                <td
                    th:text="${#temporals.format(
                        reserva.fechaHora,
                        'dd/MM/yyyy HH:mm'
                    )}">
                </td>

                <td th:text="${reserva.servicio.nombre}"></td>

                <td
                    th:text="${reserva.barbero != null
                        ? reserva.barbero.nombre
                        : 'Sin asignar'}">
                </td>

                <td>
                    <span
                        class="badge"
                        th:classappend="${
                            reserva.estado == 'COMPLETADA'
                                ? ' text-bg-success'
                                : reserva.estado == 'CANCELADA'
                                ? ' text-bg-danger'
                                : reserva.estado == 'CONFIRMADA'
                                ? ' text-bg-primary'
                                : ' text-bg-warning'
                        }"
                        th:text="${reserva.estado}">
                    </span>
                </td>
<form
    th:action="@{/admin/servicios/eliminar/{id}(id=${servicio.id})}"
    method="post"
    onsubmit="return confirm('¿Deseas eliminar este servicio del catálogo?');">

    <button class="btn btn-danger btn-sm">
        Eliminar
    </button>
</form>
                <td>
                    <form
                        th:if="${
                            reserva.estado != 'CANCELADA'
                            and reserva.estado != 'COMPLETADA'
                        }"
                        th:action="@{/reservas/cancelar/{id}(id=${reserva.id})}"
                        method="post"
                        onsubmit="return confirm('¿Deseas cancelar esta cita?');">

                        <button class="btn btn-danger btn-sm">
                            Cancelar
                        </button>
                    </form>
                </td>

            </tr>
            </tbody>

        </table>

    </div>

</main>

</body>
</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Reserva - BarberTime</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-5" style="max-width: 650px;">

    <div class="card shadow-sm">
        <div class="card-body p-4">

            <h2 class="mb-4">Nueva reserva</h2>

            <div
                th:if="${error}"
                class="alert alert-danger"
                th:text="${error}">
            </div>

            <form th:action="@{/reservas/guardar}" method="post">

                <div class="mb-3">
                    <label class="form-label">Servicio</label>

                    <select
                        name="servicioId"
                        class="form-select"
                        required>

                        <option value="">Seleccione un servicio</option>

                        <option
                            th:each="servicio : ${servicios}"
                            th:value="${servicio.id}"
                            th:text="${servicio.nombre + ' - ₡' + servicio.precio}">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Barbero</label>

                    <select
                        name="barberoId"
                        class="form-select"
                        required>

                        <option value="">Seleccione un barbero</option>

                        <option
                            th:each="barbero : ${barberos}"
                            th:value="${barbero.id}"
                            th:text="${barbero.nombre}">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Fecha y hora</label>

                    <input
                        id="fechaHora"
                        type="datetime-local"
                        name="fechaHora"
                        class="form-control"
                        required>
                </div>

                <div class="d-flex gap-2">
                    <button class="btn btn-warning">
                        Reservar
                    </button>

                    <a
                        th:href="@{/reservas/mis-reservas}"
                        class="btn btn-outline-secondary">
                        Volver
                    </a>
                </div>

            </form>

        </div>
    </div>

</main>

<script>
    const fechaInput = document.getElementById("fechaHora");

    const ahora = new Date();
    ahora.setMinutes(ahora.getMinutes() - ahora.getTimezoneOffset());

    fechaInput.min = ahora.toISOString().slice(0, 16);
</script>

<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>

<!DOCTYPE html>
<html
    xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<body>

<nav
    th:fragment="navbar"
    class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">

    <div class="container">

        <a class="navbar-brand fw-bold" th:href="@{/}">
            <span class="text-warning">Barber</span>Time
        </a>

        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navMenu">

            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMenu">

            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">
                        Inicio
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/#servicios}">
                        Servicios
                    </a>
                </li>

                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/reservas/mis-reservas}">
                        Mis reservas
                    </a>
                </li>

                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/perfil}">
                        Mi perfil
                    </a>
                </li>

                <li
                    class="nav-item"
                    sec:authorize="hasAnyRole('BARBERO','ADMIN')">

                    <a class="nav-link" th:href="@{/barbero/citas}">
                        Mi agenda
                    </a>
                </li>

                <li
                    class="nav-item dropdown"
                    sec:authorize="hasRole('ADMIN')">

                    <a
                        class="nav-link dropdown-toggle"
                        href="#"
                        data-bs-toggle="dropdown">

                        Administración
                    </a>

                    <ul class="dropdown-menu">
                        <li>
                            <a
                                class="dropdown-item"
                                th:href="@{/admin/reservas}">

                                Reservas
                            </a>
                        </li>

                        <li>
                            <a
                                class="dropdown-item"
                                th:href="@{/admin/servicios}">

                                Servicios
                            </a>
                        </li>

                        <li>
                            <a
                                class="dropdown-item"
                                th:href="@{/admin/barberos}">

                                Barberos
                            </a>
                        </li>

                        <li>
                            <a
                                class="dropdown-item"
                                th:href="@{/admin/pagos}">

                                Pagos
                            </a>
                        </li>
                    </ul>
                </li>

            </ul>

            <div sec:authorize="isAnonymous()" class="d-flex gap-2">

                <a
                    th:href="@{/login}"
                    class="btn btn-outline-warning">

                    Iniciar sesión
                </a>

                <a
                    th:href="@{/registro}"
                    class="btn btn-warning">

                    Registrarse
                </a>

            </div>

            <div
                sec:authorize="isAuthenticated()"
                class="d-flex align-items-center gap-3">

                <span class="text-light">
                    Hola,
                    <strong sec:authentication="name"></strong>
                </span>

                <form th:action="@{/logout}" method="post">
                    <button class="btn btn-outline-warning">
                        Cerrar sesión
                    </button>
                </form>

            </div>

        </div>
    </div>
</nav>

</body>
</html>

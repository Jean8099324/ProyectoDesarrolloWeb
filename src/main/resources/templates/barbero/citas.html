<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Agenda del Barbero - BarberTime</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>

    <main class="container py-5">
        <h2 class="mb-4">Mi Agenda de Citas</h2>

        <div th:if="${reservas.isEmpty()}" class="alert alert-info">
            No tienes citas programadas.
        </div>

        <div class="table-responsive" th:unless="${reservas.isEmpty()}">
            <table class="table table-bordered table-hover bg-white shadow-sm">
                <thead class="table-dark">
                    <tr>
                        <th>Fecha y Hora</th>
                        <th>Cliente</th>
                        <th>Servicio</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="reserva : ${reservas}">
                        <td th:text="${#temporals.format(reserva.fechaHora, 'dd/MM/yyyy HH:mm')}"></td>
                        <!-- Aquí mostramos el nombre del cliente (usuario) -->
                        <td th:text="${reserva.usuario.nombre}"></td>
                        <td th:text="${reserva.servicio.nombre}"></td>
                        <td>
                            <span class="badge" 
                                  th:classappend="${reserva.estado == 'COMPLETADA' ? 'text-bg-success' : (reserva.estado == 'CANCELADA' ? 'text-bg-danger' : 'text-bg-warning')}"
                                  th:text="${reserva.estado}">
                            </span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>

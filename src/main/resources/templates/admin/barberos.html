<!DOCTYPE html>
<html lang="es"
    xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Administrar barberos - BarberTime</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-5 flex-grow-1">

    <h2 class="mb-4">Administración de barberos</h2>

    <div th:if="${mensaje}"
        class="alert alert-success"
        th:text="${mensaje}">
    </div>

    <div th:if="${error}"
        class="alert alert-danger"
        th:text="${error}">
    </div>

    <div class="row g-4">

        <div class="col-lg-5">

            <div class="card shadow-sm">
                <div class="card-body">

                    <h4 class="mb-3">Registrar barbero</h4>

                    <form
                        th:action="@{/admin/barberos/guardar}"
                        method="post">

                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input
                                type="text"
                                name="nombre"
                                class="form-control"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Correo</label>
                            <input
                                type="email"
                                name="correo"
                                class="form-control"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Teléfono</label>
                            <input
                                type="text"
                                name="telefono"
                                class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Contraseña
                            </label>

                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                minlength="6"
                                required>
                        </div>

                        <button class="btn btn-warning w-100">
                            Registrar barbero
                        </button>

                    </form>

                </div>
            </div>

        </div>

        <div class="col-lg-7">

            <div class="card shadow-sm">
                <div class="card-body">

                    <h4 class="mb-3">Barberos registrados</h4>

                    <div th:if="${barberos.isEmpty()}"
                        class="alert alert-info">

                        No existen barberos registrados.
                    </div>

                    <div class="table-responsive"
                        th:unless="${barberos.isEmpty()}">

                        <table class="table table-hover align-middle">

                            <thead class="table-dark">
                            <tr>
                                <th>Nombre</th>
                                <th>Correo</th>
                                <th>Teléfono</th>
                            </tr>
                            </thead>

                            <tbody>
                            <tr th:each="barbero : ${barberos}">
                                <td th:text="${barbero.nombre}"></td>
                                <td th:text="${barbero.correo}"></td>
                                <td th:text="${
                                    barbero.telefono != null
                                    and !barbero.telefono.isBlank()
                                    ? barbero.telefono
                                    : 'No registrado'
                                }"></td>
                            </tr>
                            </tbody>

                        </table>

                    </div>

                </div>
            </div>

        </div>

    </div>

</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>

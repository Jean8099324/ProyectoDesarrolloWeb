<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nueva Reserva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-5">
    <h2>Nueva Reserva</h2>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/reservas/guardar}" method="post">

        <div class="mb-3">
            <label class="form-label">Servicio</label>
            <select name="servicioId" class="form-control" required>
                <option th:each="servicio : ${servicios}"
                        th:value="${servicio.id}"
                        th:text="${servicio.nombre + ' - ₡' + servicio.precio}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Fecha y hora</label>
            <input type="datetime-local" name="fechaHora" class="form-control" required>
        </div>

        <button class="btn btn-warning">Reservar</button>
    </form>
</div>

</body>
</html>
